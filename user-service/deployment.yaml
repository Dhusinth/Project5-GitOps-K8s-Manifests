apiVersion: apps/v1
kind: Deployment

metadata:
  name: user-service
  namespace: gitops-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: user-service

  template:
    metadata:
      labels:
        app: user-service

    spec:
      containers:
      - name: user-service

        image: dhusinth123/user-service:6

        ports:
        - containerPort: 5000
