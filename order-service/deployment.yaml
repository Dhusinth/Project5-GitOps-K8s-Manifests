apiVersion: apps/v1
kind: Deployment

metadata:
  name: order-service
  namespace: gitops-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service

    spec:
      containers:
      - name: order-service

        image: dhusinth123/order-service:6

        ports:
        - containerPort: 5000
