apiVersion: apps/v1
kind: Deployment

metadata:
  name: product-service
  namespace: gitops-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: product-service

  template:
    metadata:
      labels:
        app: product-service

    spec:
      containers:
      - name: product-service

        image: dhusinth123/product-service:6

        ports:
        - containerPort: 5000
